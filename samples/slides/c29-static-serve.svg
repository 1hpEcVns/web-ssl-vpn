<text x="20.00px" y="50.60px" xml:space="preserve">
</text><text x="20.00px" y="66.20px" xml:space="preserve"><tspan fill="#81a1c1" font-weight="bold">fn</tspan> <tspan fill="#88c0d0">load_static_files</tspan><tspan fill="#eceff4">(</tspan>dist_dir: <tspan fill="#81a1c1">&amp;</tspan><tspan fill="#8fbcbb">Path</tspan><tspan fill="#eceff4">)</tspan> -&gt; <tspan fill="#8fbcbb">HashMap</tspan><tspan fill="#81a1c1">&lt;</tspan><tspan fill="#81a1c1">String</tspan><tspan fill="#eceff4">,</tspan> <tspan fill="#81a1c1">Vec</tspan><tspan fill="#81a1c1">&lt;</tspan><tspan fill="#81a1c1">u8</tspan><tspan fill="#81a1c1">&gt;&gt;</tspan> <tspan fill="#eceff4">{</tspan>
</text><text x="20.00px" y="81.80px" xml:space="preserve">    <tspan fill="#81a1c1" font-weight="bold">let</tspan> <tspan fill="#81a1c1" font-weight="bold">mut</tspan> map <tspan fill="#81a1c1">=</tspan> HashMap::new<tspan fill="#eceff4">();</tspan>
</text><text x="20.00px" y="97.40px" xml:space="preserve">    <tspan fill="#81a1c1" font-weight="bold">if</tspan> <tspan fill="#81a1c1" font-weight="bold">let</tspan> <tspan fill="#81a1c1">Ok</tspan><tspan fill="#eceff4">(</tspan>entries<tspan fill="#eceff4">)</tspan> <tspan fill="#81a1c1">=</tspan> std::fs::read_dir<tspan fill="#eceff4">(</tspan>dist_dir<tspan fill="#eceff4">)</tspan> <tspan fill="#eceff4">{</tspan>
</text><text x="20.00px" y="113.00px" xml:space="preserve">        <tspan fill="#81a1c1" font-weight="bold">for</tspan> entry <tspan fill="#81a1c1" font-weight="bold">in</tspan> entries<tspan fill="#eceff4">.</tspan>flatten<tspan fill="#eceff4">()</tspan> <tspan fill="#eceff4">{</tspan>
</text><text x="20.00px" y="128.60px" xml:space="preserve">            <tspan fill="#81a1c1" font-weight="bold">let</tspan> path <tspan fill="#81a1c1">=</tspan> entry<tspan fill="#eceff4">.</tspan>path<tspan fill="#eceff4">();</tspan>
</text><text x="20.00px" y="144.20px" xml:space="preserve">            <tspan fill="#81a1c1" font-weight="bold">if</tspan> <tspan fill="#81a1c1" font-weight="bold">let</tspan> <tspan fill="#81a1c1">Some</tspan><tspan fill="#eceff4">(</tspan>name<tspan fill="#eceff4">)</tspan> <tspan fill="#81a1c1">=</tspan> path<tspan fill="#eceff4">.</tspan>file_name<tspan fill="#eceff4">().</tspan>and_then<tspan fill="#eceff4">(</tspan><tspan fill="#81a1c1">|</tspan>n<tspan fill="#81a1c1">|</tspan> n<tspan fill="#eceff4">.</tspan>to_str<tspan fill="#eceff4">())</tspan> <tspan fill="#eceff4">{</tspan>
</text><text x="20.00px" y="159.80px" xml:space="preserve">                <tspan fill="#81a1c1" font-weight="bold">if</tspan> <tspan fill="#81a1c1" font-weight="bold">let</tspan> <tspan fill="#81a1c1">Ok</tspan><tspan fill="#eceff4">(</tspan>data<tspan fill="#eceff4">)</tspan> <tspan fill="#81a1c1">=</tspan> std::fs::read<tspan fill="#eceff4">(</tspan><tspan fill="#81a1c1">&amp;</tspan>path<tspan fill="#eceff4">)</tspan> <tspan fill="#eceff4">{</tspan>
</text><text x="20.00px" y="175.40px" xml:space="preserve">                    map<tspan fill="#eceff4">.</tspan>insert<tspan fill="#eceff4">(</tspan>format!<tspan fill="#eceff4">(</tspan><tspan fill="#a3be8c">&quot;/</tspan><tspan fill="#a3be8c">{}</tspan><tspan fill="#a3be8c">&quot;</tspan><tspan fill="#eceff4">,</tspan> name<tspan fill="#eceff4">),</tspan> data<tspan fill="#eceff4">);</tspan>
</text><text x="20.00px" y="191.00px" xml:space="preserve">                <tspan fill="#eceff4">}</tspan>
</text><text x="20.00px" y="206.60px" xml:space="preserve">            <tspan fill="#eceff4">}</tspan>
</text><text x="20.00px" y="222.20px" xml:space="preserve">        <tspan fill="#eceff4">}</tspan>
</text><text x="20.00px" y="237.80px" xml:space="preserve">    <tspan fill="#eceff4">}</tspan>
</text><text x="20.00px" y="253.40px" xml:space="preserve">    map
</text><text x="20.00px" y="269.00px" xml:space="preserve"><tspan fill="#eceff4">}</tspan>
</text><text x="20.00px" y="284.60px" xml:space="preserve">
</text><text x="20.00px" y="300.20px" xml:space="preserve"><tspan fill="#81a1c1" font-weight="bold">fn</tspan> <tspan fill="#88c0d0">get_mime</tspan><tspan fill="#eceff4">(</tspan>path: <tspan fill="#81a1c1">&amp;</tspan><tspan fill="#81a1c1">str</tspan><tspan fill="#eceff4">)</tspan> -&gt; <tspan fill="#81a1c1">&amp;</tspan><tspan fill="#81a1c1">str</tspan> <tspan fill="#eceff4">{</tspan>
</text><text x="20.00px" y="315.80px" xml:space="preserve">    <tspan fill="#81a1c1" font-weight="bold">if</tspan> path<tspan fill="#eceff4">.</tspan>ends_with<tspan fill="#eceff4">(</tspan><tspan fill="#a3be8c">&quot;.html&quot;</tspan><tspan fill="#eceff4">)</tspan> <tspan fill="#eceff4">{</tspan> <tspan fill="#a3be8c">&quot;text/html; charset=utf-8&quot;</tspan> <tspan fill="#eceff4">}</tspan>
</text><text x="20.00px" y="331.40px" xml:space="preserve">    <tspan fill="#81a1c1" font-weight="bold">else</tspan> <tspan fill="#81a1c1" font-weight="bold">if</tspan> path<tspan fill="#eceff4">.</tspan>ends_with<tspan fill="#eceff4">(</tspan><tspan fill="#a3be8c">&quot;.js&quot;</tspan><tspan fill="#eceff4">)</tspan> <tspan fill="#eceff4">{</tspan> <tspan fill="#a3be8c">&quot;application/javascript&quot;</tspan> <tspan fill="#eceff4">}</tspan>
</text><text x="20.00px" y="347.00px" xml:space="preserve">    <tspan fill="#81a1c1" font-weight="bold">else</tspan> <tspan fill="#81a1c1" font-weight="bold">if</tspan> path<tspan fill="#eceff4">.</tspan>ends_with<tspan fill="#eceff4">(</tspan><tspan fill="#a3be8c">&quot;.wasm&quot;</tspan><tspan fill="#eceff4">)</tspan> <tspan fill="#eceff4">{</tspan> <tspan fill="#a3be8c">&quot;application/wasm&quot;</tspan> <tspan fill="#eceff4">}</tspan>
</text><text x="20.00px" y="362.60px" xml:space="preserve">    <tspan fill="#81a1c1" font-weight="bold">else</tspan> <tspan fill="#eceff4">{</tspan> <tspan fill="#a3be8c">&quot;application/octet-stream&quot;</tspan> <tspan fill="#eceff4">}</tspan>
</text><text x="20.00px" y="378.20px" xml:space="preserve"><tspan fill="#eceff4">}</tspan>
</text><text x="20.00px" y="393.80px" xml:space="preserve">
</text><text x="20.00px" y="409.40px" xml:space="preserve"><tspan fill="#81a1c1" font-weight="bold">async</tspan> <tspan fill="#81a1c1" font-weight="bold">fn</tspan> <tspan fill="#88c0d0">respond_static</tspan><tspan fill="#eceff4">(</tspan>session: <tspan fill="#81a1c1">&amp;</tspan><tspan fill="#8fbcbb">mut</tspan> Session<tspan fill="#eceff4">,</tspan> data: <tspan fill="#81a1c1">&amp;</tspan><tspan fill="#eceff4">[</tspan><tspan fill="#81a1c1">u8</tspan><tspan fill="#eceff4">],</tspan> mime: <tspan fill="#81a1c1">&amp;</tspan><tspan fill="#81a1c1">str</tspan><tspan fill="#eceff4">)</tspan> <tspan fill="#eceff4">{</tspan>
</text><text x="20.00px" y="425.00px" xml:space="preserve">    <tspan fill="#81a1c1" font-weight="bold">let</tspan> <tspan fill="#81a1c1" font-weight="bold">mut</tspan> resp <tspan fill="#81a1c1">=</tspan> <tspan fill="#81a1c1" font-weight="bold">match</tspan> pingora_http::ResponseHeader::build<tspan fill="#eceff4">(</tspan>http::StatusCode::<tspan fill="#8fbcbb">OK</tspan><tspan fill="#eceff4">,</tspan> <tspan fill="#81a1c1">Some</tspan><tspan fill="#eceff4">(</tspan><tspan fill="#b48ead">4</tspan><tspan fill="#eceff4">))</tspan> <tspan fill="#eceff4">{</tspan>
</text><text x="20.00px" y="440.60px" xml:space="preserve">        <tspan fill="#81a1c1">Ok</tspan><tspan fill="#eceff4">(</tspan>r<tspan fill="#eceff4">)</tspan> <tspan fill="#81a1c1">=&gt;</tspan> r<tspan fill="#eceff4">,</tspan>
</text><text x="20.00px" y="456.20px" xml:space="preserve">        <tspan fill="#81a1c1">Err</tspan><tspan fill="#eceff4">(</tspan>_<tspan fill="#eceff4">)</tspan> <tspan fill="#81a1c1">=&gt;</tspan> <tspan fill="#81a1c1" font-weight="bold">return</tspan><tspan fill="#eceff4">,</tspan>
</text><text x="20.00px" y="471.80px" xml:space="preserve">    <tspan fill="#eceff4">};</tspan>
</text><text x="20.00px" y="487.40px" xml:space="preserve">    resp<tspan fill="#eceff4">.</tspan>insert_header<tspan fill="#eceff4">(</tspan><tspan fill="#a3be8c">&quot;Content-Type&quot;</tspan><tspan fill="#eceff4">,</tspan> mime<tspan fill="#eceff4">).</tspan>ok<tspan fill="#eceff4">();</tspan>
</text><text x="20.00px" y="503.00px" xml:space="preserve">    resp<tspan fill="#eceff4">.</tspan>insert_header<tspan fill="#eceff4">(</tspan><tspan fill="#a3be8c">&quot;Content-Length&quot;</tspan><tspan fill="#eceff4">,</tspan> data<tspan fill="#eceff4">.</tspan>len<tspan fill="#eceff4">().</tspan>to_string<tspan fill="#eceff4">()).</tspan>ok<tspan fill="#eceff4">();</tspan>
</text><text x="20.00px" y="518.60px" xml:space="preserve">    <tspan fill="#81a1c1" font-weight="bold">let</tspan> _ <tspan fill="#81a1c1">=</tspan> session<tspan fill="#eceff4">.</tspan>write_response_header<tspan fill="#eceff4">(</tspan><tspan fill="#81a1c1">Box</tspan>::new<tspan fill="#eceff4">(</tspan>resp<tspan fill="#eceff4">),</tspan> <tspan fill="#81a1c1" font-weight="bold">false</tspan><tspan fill="#eceff4">).</tspan><tspan fill="#81a1c1" font-weight="bold">await</tspan><tspan fill="#eceff4">;</tspan>
</text><text x="20.00px" y="534.20px" xml:space="preserve">    <tspan fill="#81a1c1" font-weight="bold">let</tspan> _ <tspan fill="#81a1c1">=</tspan> session<tspan fill="#eceff4">.</tspan>write_response_body<tspan fill="#eceff4">(</tspan><tspan fill="#81a1c1">Some</tspan><tspan fill="#eceff4">(</tspan>Bytes::from<tspan fill="#eceff4">(</tspan>data<tspan fill="#eceff4">.</tspan>to_vec<tspan fill="#eceff4">())),</tspan> <tspan fill="#81a1c1" font-weight="bold">true</tspan><tspan fill="#eceff4">).</tspan><tspan fill="#81a1c1" font-weight="bold">await</tspan><tspan fill="#eceff4">;</tspan></text>
