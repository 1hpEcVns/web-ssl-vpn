<g font-family="Maple Mono NF CN" font-size="13.00px" fill="#d8dee9" clip-path="url(#terminalMask)">
<text x="20.00px" y="50.60px" xml:space="preserve"><tspan fill="#81a1c1" font-weight="bold">pub</tspan> <tspan fill="#81a1c1" font-weight="bold">async</tspan> <tspan fill="#81a1c1" font-weight="bold">fn</tspan> <tspan fill="#88c0d0">seed_default_apps</tspan><tspan fill="#eceff4">(</tspan>db: <tspan fill="#81a1c1">&amp;</tspan><tspan fill="#8fbcbb">DatabaseConnection</tspan><tspan fill="#eceff4">)</tspan> -&gt; <tspan fill="#81a1c1">Result</tspan><tspan fill="#81a1c1">&lt;</tspan><tspan fill="#eceff4">(),</tspan> DbErr<tspan fill="#81a1c1">&gt;</tspan> <tspan fill="#eceff4">{</tspan>
</text><text x="20.00px" y="66.20px" xml:space="preserve">    <tspan fill="#81a1c1" font-weight="bold">let</tspan> count <tspan fill="#81a1c1">=</tspan> AppEntity::find<tspan fill="#eceff4">().</tspan>count<tspan fill="#eceff4">(</tspan>db<tspan fill="#eceff4">).</tspan><tspan fill="#81a1c1" font-weight="bold">await</tspan><tspan fill="#81a1c1">?</tspan><tspan fill="#eceff4">;</tspan>
</text><text x="20.00px" y="81.80px" xml:space="preserve">    <tspan fill="#81a1c1" font-weight="bold">if</tspan> count <tspan fill="#81a1c1">==</tspan> <tspan fill="#b48ead">0</tspan> <tspan fill="#eceff4">{</tspan>
</text><text x="20.00px" y="97.40px" xml:space="preserve">        create_app<tspan fill="#eceff4">(</tspan>db<tspan fill="#eceff4">,</tspan> <tspan fill="#a3be8c">&quot;Internal Wiki&quot;</tspan><tspan fill="#eceff4">,</tspan> <tspan fill="#a3be8c">&quot;Company documentation and knowledge base&quot;</tspan><tspan fill="#eceff4">,</tspan> <tspan fill="#a3be8c">&quot;wiki.internal:3000&quot;</tspan><tspan fill="#eceff4">,</tspan> <tspan fill="#a3be8c">&quot;&quot;</tspan><tspan fill="#eceff4">).</tspan><tspan fill="#81a1c1" font-weight="bold">await</tspan><tspan fill="#81a1c1">?</tspan><tspan fill="#eceff4">;</tspan>
</text><text x="20.00px" y="113.00px" xml:space="preserve">        create_app<tspan fill="#eceff4">(</tspan>db<tspan fill="#eceff4">,</tspan> <tspan fill="#a3be8c">&quot;Mail Server&quot;</tspan><tspan fill="#eceff4">,</tspan> <tspan fill="#a3be8c">&quot;Roundcube webmail interface&quot;</tspan><tspan fill="#eceff4">,</tspan> <tspan fill="#a3be8c">&quot;mail.internal:8080&quot;</tspan><tspan fill="#eceff4">,</tspan> <tspan fill="#a3be8c">&quot;&quot;</tspan><tspan fill="#eceff4">).</tspan><tspan fill="#81a1c1" font-weight="bold">await</tspan><tspan fill="#81a1c1">?</tspan><tspan fill="#eceff4">;</tspan>
</text><text x="20.00px" y="128.60px" xml:space="preserve">        create_app<tspan fill="#eceff4">(</tspan>db<tspan fill="#eceff4">,</tspan> <tspan fill="#a3be8c">&quot;File Repository&quot;</tspan><tspan fill="#eceff4">,</tspan> <tspan fill="#a3be8c">&quot;Internal file sharing and downloads&quot;</tspan><tspan fill="#eceff4">,</tspan> <tspan fill="#a3be8c">&quot;files.internal:9000&quot;</tspan><tspan fill="#eceff4">,</tspan> <tspan fill="#a3be8c">&quot;&quot;</tspan><tspan fill="#eceff4">).</tspan><tspan fill="#81a1c1" font-weight="bold">await</tspan><tspan fill="#81a1c1">?</tspan><tspan fill="#eceff4">;</tspan>
</text><text x="20.00px" y="144.20px" xml:space="preserve">        create_app<tspan fill="#eceff4">(</tspan>db<tspan fill="#eceff4">,</tspan> <tspan fill="#a3be8c">&quot;HR Portal&quot;</tspan><tspan fill="#eceff4">,</tspan> <tspan fill="#a3be8c">&quot;Human resources management system&quot;</tspan><tspan fill="#eceff4">,</tspan> <tspan fill="#a3be8c">&quot;hr.internal:5000&quot;</tspan><tspan fill="#eceff4">,</tspan> <tspan fill="#a3be8c">&quot;&quot;</tspan><tspan fill="#eceff4">).</tspan><tspan fill="#81a1c1" font-weight="bold">await</tspan><tspan fill="#81a1c1">?</tspan><tspan fill="#eceff4">;</tspan>
</text><text x="20.00px" y="159.80px" xml:space="preserve">
</text><text x="20.00px" y="175.40px" xml:space="preserve">        <tspan fill="#81a1c1" font-weight="bold">let</tspan> admin <tspan fill="#81a1c1">=</tspan> find_user_by_username<tspan fill="#eceff4">(</tspan>db<tspan fill="#eceff4">,</tspan> <tspan fill="#a3be8c">&quot;admin&quot;</tspan><tspan fill="#eceff4">).</tspan><tspan fill="#81a1c1" font-weight="bold">await</tspan><tspan fill="#81a1c1">?</tspan><tspan fill="#eceff4">;</tspan>
</text><text x="20.00px" y="191.00px" xml:space="preserve">        <tspan fill="#81a1c1" font-weight="bold">if</tspan> <tspan fill="#81a1c1" font-weight="bold">let</tspan> <tspan fill="#81a1c1">Some</tspan><tspan fill="#eceff4">(</tspan>admin<tspan fill="#eceff4">)</tspan> <tspan fill="#81a1c1">=</tspan> admin <tspan fill="#eceff4">{</tspan>
</text><text x="20.00px" y="206.60px" xml:space="preserve">            <tspan fill="#81a1c1" font-weight="bold">let</tspan> apps <tspan fill="#81a1c1">=</tspan> get_all_apps<tspan fill="#eceff4">(</tspan>db<tspan fill="#eceff4">).</tspan><tspan fill="#81a1c1" font-weight="bold">await</tspan><tspan fill="#81a1c1">?</tspan><tspan fill="#eceff4">;</tspan>
</text><text x="20.00px" y="222.20px" xml:space="preserve">            <tspan fill="#81a1c1" font-weight="bold">let</tspan> app_ids: <tspan fill="#81a1c1">Vec</tspan><tspan fill="#81a1c1">&lt;</tspan><tspan fill="#81a1c1">i64</tspan><tspan fill="#81a1c1">&gt;</tspan> <tspan fill="#81a1c1">=</tspan> apps<tspan fill="#eceff4">.</tspan>iter<tspan fill="#eceff4">().</tspan>map<tspan fill="#eceff4">(</tspan><tspan fill="#81a1c1">|</tspan>a<tspan fill="#81a1c1">|</tspan> a<tspan fill="#eceff4">.</tspan>id<tspan fill="#eceff4">).</tspan>collect<tspan fill="#eceff4">();</tspan>
</text><text x="20.00px" y="237.80px" xml:space="preserve">            set_user_permissions<tspan fill="#eceff4">(</tspan>db<tspan fill="#eceff4">,</tspan> admin<tspan fill="#eceff4">.</tspan>id<tspan fill="#eceff4">,</tspan> <tspan fill="#81a1c1">&amp;</tspan>app_ids<tspan fill="#eceff4">).</tspan><tspan fill="#81a1c1" font-weight="bold">await</tspan><tspan fill="#81a1c1">?</tspan><tspan fill="#eceff4">;</tspan>
</text><text x="20.00px" y="253.40px" xml:space="preserve">        <tspan fill="#eceff4">}</tspan>
</text><text x="20.00px" y="269.00px" xml:space="preserve">
</text><text x="20.00px" y="284.60px" xml:space="preserve">        info!<tspan fill="#eceff4">(</tspan><tspan fill="#a3be8c">&quot;Default demo applications seeded: Wiki, Mail, Files, HR&quot;</tspan><tspan fill="#eceff4">);</tspan>
</text><text x="20.00px" y="300.20px" xml:space="preserve">    <tspan fill="#eceff4">}</tspan>
</text><text x="20.00px" y="315.80px" xml:space="preserve">    <tspan fill="#81a1c1">Ok</tspan><tspan fill="#eceff4">(())</tspan>
</text><text x="20.00px" y="331.40px" xml:space="preserve"><tspan fill="#eceff4">}</tspan></text>
