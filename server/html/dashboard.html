<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web SSL VPN - Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; color: #e0e0e0; }
        .header { background: rgba(0,0,0,0.2); padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .header h1 { font-size: 18px; color: #4fc3f7; }
        .user-info { display: flex; align-items: center; gap: 16px; font-size: 14px; }
        .logout-btn { padding: 6px 16px; background: rgba(239,83,80,0.2); border: 1px solid rgba(239,83,80,0.3); color: #ef5350; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .logout-btn:hover { background: rgba(239,83,80,0.3); }
        .main { padding: 32px; max-width: 1200px; margin: 0 auto; }
        .section { margin-bottom: 32px; }
        .section h2 { font-size: 16px; color: #a0a0a0; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .app-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
        .app-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 24px; text-decoration: none; color: #e0e0e0; display: block; transition: all 0.2s; }
        .app-card:hover { background: rgba(255,255,255,0.08); border-color: #4fc3f7; transform: translateY(-2px); }
        .app-icon { width: 48px; height: 48px; background: linear-gradient(135deg, #0f3460, #4fc3f7); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; margin-bottom: 12px; }
        .app-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
        .app-desc { font-size: 13px; color: #808080; margin-bottom: 8px; }
        .app-url { font-size: 11px; color: #4fc3f7; font-family: monospace; }
        .empty-state { text-align: center; color: #606060; padding: 40px; font-size: 14px; }
        .admin-links { display: flex; gap: 12px; flex-wrap: wrap; }
        .admin-link { padding: 8px 16px; background: rgba(79,195,247,0.1); border: 1px solid rgba(79,195,247,0.2); color: #4fc3f7; border-radius: 6px; text-decoration: none; font-size: 13px; cursor: pointer; }
        .admin-link:hover { background: rgba(79,195,247,0.2); }
        .log-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .log-table th { text-align: left; padding: 10px 12px; background: rgba(0,0,0,0.2); color: #a0a0a0; font-weight: 500; }
        .log-table td { padding: 8px 12px; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .log-table tr:hover td { background: rgba(255,255,255,0.02); }
        .badge { padding: 2px 8px; border-radius: 10px; font-size: 11px; }
        .badge-success { background: rgba(76,175,80,0.2); color: #66bb6a; }
        .badge-error { background: rgba(239,83,80,0.2); color: #ef5350; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #1a1a2e; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 24px; max-width: 480px; width: 90%; max-height: 80vh; overflow-y: auto; }
        .close { float: right; color: #a0a0a0; font-size: 24px; cursor: pointer; }
        .close:hover { color: #e0e0e0; }
        .modal h3 { margin-bottom: 16px; color: #4fc3f7; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; color: #a0a0a0; font-size: 12px; margin-bottom: 4px; }
        .form-group input, .form-group select { width: 100%; padding: 8px 12px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #e0e0e0; font-size: 14px; outline: none; }
        .form-group input:focus, .form-group select:focus { border-color: #4fc3f7; }
        .btn { padding: 8px 16px; background: linear-gradient(135deg, #0f3460, #16213e); color: #e0e0e0; border: 1px solid rgba(79,195,247,0.3); border-radius: 6px; cursor: pointer; font-size: 13px; }
        .btn:hover { border-color: #4fc3f7; }
        .btn-danger { border-color: rgba(239,83,80,0.3); color: #ef5350; }
        .btn-danger:hover { background: rgba(239,83,80,0.1); }
        .status { color: #66bb6a; font-size: 13px; margin-top: 4px; display: none; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Web SSL VPN Dashboard</h1>
        <div class="user-info">
            <span>Welcome, <strong>{username}</strong> ({role})</span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>
    <div class="main">
        <div class="section">
            <h2>Your Applications</h2>
            <div class="app-grid">
                {app_cards}
            </div>
        </div>
        {admin_section}
    </div>
    <script>
        async function logout() {
            await fetch('/api/auth/logout', { method: 'POST' });
            window.location.href = '/';
        }

        async function loadAuditLogs() {
            try {
                const res = await fetch('/api/audit');
                const data = await res.json();
                if (!data.success) return;
                const logs = data.data;
                let html = '<h2>Recent Activity</h2><table class="log-table"><tr><th>Time</th><th>User</th><th>Action</th><th>Target</th><th>Result</th></tr>';
                for (const l of logs) {
                    html += '<tr><td>' + l.timestamp + '</td><td>' + (l.user_id || '-') + '</td><td>' + l.action + '</td><td>' + l.target_url + '</td><td><span class="badge ' + (l.result === 'success' ? 'badge-success' : 'badge-error') + '">' + l.result + '</span></td></tr>';
                }
                html += '</table>';
                document.getElementById('adminContent').innerHTML = html;
            } catch(e) { }
        }

        async function loadUsers() {
            try {
                const res = await fetch('/api/users');
                const data = await res.json();
                if (!data.success) return;
                let html = '<h2>Users</h2><table class="log-table"><tr><th>ID</th><th>Username</th><th>Role</th><th>Actions</th></tr>';
                for (const u of data.data) {
                    html += '<tr><td>' + u.id + '</td><td>' + u.username + '</td><td>' + u.role + '</td><td><button class="btn" onclick="managePermissions(' + u.id + ')">Permissions</button></td></tr>';
                }
                html += '</table><div style="margin-top:16px"><button class="btn" onclick="showAddUser()">Add User</button></div>';
                document.getElementById('adminContent').innerHTML = html;
            } catch(e) { }
        }

        async function loadApps() {
            try {
                const res = await fetch('/api/apps');
                const data = await res.json();
                if (!data.success) return;
                let html = '<h2>All Applications</h2><table class="log-table"><tr><th>ID</th><th>Name</th><th>URL</th><th>Actions</th></tr>';
                for (const a of data.data) {
                    html += '<tr><td>' + a.id + '</td><td>' + a.name + '</td><td>' + a.url + '</td><td><button class="btn btn-danger" onclick="deleteApp(' + a.id + ')">Delete</button></td></tr>';
                }
                html += '</table>';
                document.getElementById('adminContent').innerHTML = html;
            } catch(e) { }
        }

        async function deleteApp(id) {
            if (!confirm('Delete this application?')) return;
            await fetch('/api/apps/' + id, { method: 'DELETE' });
            loadApps();
        }

        function showAddApp() {
            const html = '<h3>Add Application</h3>' +
                '<div class="form-group"><label>Name</label><input id="appName"></div>' +
                '<div class="form-group"><label>Description</label><input id="appDesc"></div>' +
                '<div class="form-group"><label>URL (e.g. 127.0.0.1:3000)</label><input id="appUrl"></div>' +
                '<button class="btn" onclick="addApp()">Create</button>' +
                '<div class="status" id="appStatus"></div>';
            openModal(html);
        }

        async function addApp() {
            const name = document.getElementById('appName').value;
            const desc = document.getElementById('appDesc').value;
            const url = document.getElementById('appUrl').value;
            if (!name || !url) return;
            const res = await fetch('/api/apps', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name, description: desc, url: url })
            });
            const data = await res.json();
            const st = document.getElementById('appStatus');
            st.style.display = 'block';
            if (data.success) {
                st.textContent = 'App created successfully!';
                setTimeout(() => { closeModal(); loadApps(); }, 1000);
            } else {
                st.textContent = data.error || 'Error';
            }
        }

        function showAddUser() {
            const html = '<h3>Create User</h3>' +
                '<div class="form-group"><label>Username</label><input id="newUsername"></div>' +
                '<div class="form-group"><label>Password</label><input id="newPassword" type="password"></div>' +
                '<div class="form-group"><label>Role</label><select id="newRole"><option value="user">User</option><option value="admin">Admin</option></select></div>' +
                '<button class="btn" onclick="addUser()">Create</button>' +
                '<div class="status" id="userStatus"></div>';
            openModal(html);
        }

        async function addUser() {
            const username = document.getElementById('newUsername').value;
            const password = document.getElementById('newPassword').value;
            const role = document.getElementById('newRole').value;
            if (!username || !password) return;
            const res = await fetch('/api/users', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: username, password: password, role: role })
            });
            const data = await res.json();
            const st = document.getElementById('userStatus');
            st.style.display = 'block';
            if (data.success) {
                st.textContent = 'User created!';
                setTimeout(() => { closeModal(); loadUsers(); }, 1000);
            } else {
                st.textContent = data.error || 'Error';
            }
        }

        async function managePermissions(userId) {
            try {
                const res = await fetch('/api/apps');
                const data = await res.json();
                let html = '<h3>Manage Permissions</h3>';
                if (data.success) {
                    for (const a of data.data) {
                        html += '<div style="margin:8px 0"><label><input type="checkbox" value="' + a.id + '" id="perm_' + a.id + '"> ' + a.name + ' (' + a.url + ')</label></div>';
                    }
                }
                html += '<button class="btn" onclick="savePermissions(' + userId + ')">Save</button><div class="status" id="permStatus"></div>';
                openModal(html);
            } catch(e) { }
        }

        async function savePermissions(userId) {
            const checkboxes = document.querySelectorAll('#modalBody input[type="checkbox"]');
            const appIds = [];
            checkboxes.forEach(cb => { if (cb.checked) appIds.push(parseInt(cb.value)); });
            await fetch('/api/users/' + userId + '/permissions', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ app_ids: appIds })
            });
            const st = document.getElementById('permStatus');
            st.style.display = 'block';
            st.textContent = 'Permissions updated!';
            setTimeout(closeModal, 1000);
        }

        function openModal(content) {
            document.getElementById('modalBody').innerHTML = content;
            document.getElementById('adminModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('adminModal').style.display = 'none';
        }

        window.onclick = function(e) {
            if (e.target === document.getElementById('adminModal')) closeModal();
        }
    </script>
</body>
</html>
